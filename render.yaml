# Render Blueprint — Docker avoids native Go "./app: Permission denied" issues.

services:
  - type: web
    name: site-activation-log-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "8080"
      - key: MONGODB_DB
        value: humblx_activation
      - key: CORS_ORIGINS
        value: https://site-activation-log.vercel.app,http://localhost:5173
      # Set in Render dashboard (secrets):
      # MONGODB_URI, GOOGLE_CLIENT_ID, ADMIN_EMAIL, ADMIN_PASSWORD
